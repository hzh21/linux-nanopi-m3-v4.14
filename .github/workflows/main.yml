name: Build Optimized King6818 Kernel

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install GCC 10 Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-10-aarch64-linux-gnu \
            g++-10-aarch64-linux-gnu \
            device-tree-compiler \
            bc libssl-dev make \
            bison flex libelf-dev \
            pkg-config curl python3

      - name: Configure and Build
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=aarch64-linux-gnu-gcc-10
          # --- 核心修复：修复 GCC 10 下 dtc 的 yylloc 重复定义问题 ---
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/' scripts/dtc/dtc-lexer.lex.c_shipped
          # -----------------------------------------------------
          # 1. 彻底禁用内核自动生成 Git 版本后缀
          touch .scmversion
          export LOCALVERSION=""
          
          # 2. 基础配置 (确认你的 defconfig 文件名正确)
          make king6818_defconfig
          
          # 3. 深度网络与内核性能调优
          ./scripts/config --set-str CONFIG_LOCALVERSION "-s5p6818"
          ./scripts/config --disable CONFIG_LOCALVERSION_AUTO
          ./scripts/config --enable CONFIG_NET_SCH_FQ
          ./scripts/config --enable CONFIG_NET_SCH_FQ_CODEL
          ./scripts/config --enable CONFIG_TCP_CONG_BBR
          ./scripts/config --set-val CONFIG_DEFAULT_TCP_CONG "bbr"
          ./scripts/config --set-val CONFIG_HZ 1000
          ./scripts/config --enable CONFIG_HZ_1000
          ./scripts/config --enable CONFIG_HIGH_RES_TIMERS
          ./scripts/config --enable CONFIG_ZRAM
          ./scripts/config --enable CONFIG_ZRAM_LZ4_COMPRESS
          ./scripts/config --enable CONFIG_ZSMALLOC

          # 1. 强制将 TUN 改为内置 (y)
          ./scripts/config --set-val CONFIG_TUN y
          
          # 2. 开启策略路由与 TPROXY (Mihomo 核心)
          ./scripts/config --enable CONFIG_IP_ADVANCED_ROUTER
          ./scripts/config --enable CONFIG_IP_MULTIPLE_TABLES
          ./scripts/config --enable CONFIG_IP_ROUTE_FWMARK
          ./scripts/config --enable CONFIG_NETFILTER_XT_TARGET_TPROXY
          ./scripts/config --enable CONFIG_NETFILTER_XT_MATCH_MARK
          ./scripts/config --enable CONFIG_NETFILTER_XT_MATCH_SOCKET
          
          # 3. 开启 IPSET (提升 Clash/Mihomo 性能)
          ./scripts/config --enable CONFIG_IP_SET
          ./scripts/config --enable CONFIG_IP_SET_HASH_IP
          ./scripts/config --enable CONFIG_IP_SET_HASH_NET
          
          # 4. 开启内核原生加速支持
          ./scripts/config --enable CONFIG_INET_UDP_DIAG   # 方便调试网络连接
          # 在脚本的配置环节加入
          ./scripts/config --enable CONFIG_OVERLAY_FS
          ./scripts/config --enable CONFIG_MEMCG
          ./scripts/config --enable CONFIG_BLK_DEV_THROTTLING
          ./scripts/config --enable CONFIG_NETFILTER_XT_MATCH_IPVS
          # 【核心优化：网络吞吐与多核分流】
          ./scripts/config --enable CONFIG_RPS
          ./scripts/config --enable CONFIG_RFS
          ./scripts/config --enable CONFIG_XPS
          ./scripts/config --set-val CONFIG_NET_RX_BUSY_POLL y
          
          # 【核心优化：连接跟踪与防丢包】
          ./scripts/config --enable CONFIG_NF_CONNTRACK_EVENTS
          ./scripts/config --enable CONFIG_NF_CONNTRACK_TIMESTAMP
          # 增大默认连接表（如果源码支持修改默认值，否则需在启动后用 sysctl 修改）
          
          # 【核心优化：网络流量公平性】
          ./scripts/config --enable CONFIG_NET_SCH_FQ_CODEL
          ./scripts/config --enable CONFIG_NET_SCH_FQ
          
          # 【极致精简：删除调试开销（提升 CPU 效率）】
          ./scripts/config --disable CONFIG_PROVE_LOCKING
          ./scripts/config --disable CONFIG_LOCKDEP
          ./scripts/config --disable CONFIG_DEBUG_PREEMPT
          ./scripts/config --disable CONFIG_STACKTRACE
          ./scripts/config --disable CONFIG_FTRACE
          ./scripts/config --disable CONFIG_DEBUG_INFO
          
          # 【性能模式：提升响应速度】
          ./scripts/config --set-val CONFIG_HZ 1000
          ./scripts/config --enable CONFIG_HZ_1000
          ./scripts/config --disable CONFIG_HZ_100
          ./scripts/config --enable CONFIG_PREEMPT
          ./scripts/config --disable CONFIG_PREEMPT_VOLUNTARY
          
          # 对于 4.14 跑 Docker，通常还需要开启这个（MEMCG 的子项）
          ./scripts/config --enable CONFIG_MEMCG_SWAP
          
          make olddefconfig
          
          # 4. 正式编译 (加入 -fcommon 解决 GCC 10 兼容性问题)
          make -j$(nproc) ARCH=$ARCH CROSS_COMPILE=$CROSS_COMPILE CC=$CC \
               KCFLAGS="-O3 -march=armv8-a+crc -mtune=cortex-a53 -fcommon -Wno-array-bounds -Wno-format-overflow" \
               Image dtbs

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Optimized-King6818-Kernel
          path: |
            arch/arm64/boot/Image
            arch/arm64/boot/dts/nexell/king6818.dtb
